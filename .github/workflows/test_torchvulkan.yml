name: torchvulkan CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
          - name: macOS Apple Silicon
            os: macos-15
          - name: Windows x86_64
            os: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Vulkan (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y vulkan-tools libvulkan-dev mesa-vulkan-drivers glslc spirv-cross
          vulkaninfo --summary

      - name: Install Vulkan (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install molten-vk vulkan-tools shaderc ninja glslang libxshmfence spirv-cross
          MVK_ICD=$(find $(brew --prefix)/share $(brew --prefix)/etc $(brew --prefix molten-vk) -name "MoltenVK_icd.json" 2>/dev/null | head -n 1)          
          echo "VK_ICD_FILENAMES=$MVK_ICD" >> $GITHUB_ENV
          echo "MVK_CONFIG_USE_METAL_ARGUMENT_BUFFERS=0" >> $GITHUB_ENV
          echo "DYLD_LIBRARY_PATH=$(brew --prefix)/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV          
          export VK_ICD_FILENAMES="$MVK_ICD"
          export MVK_CONFIG_USE_METAL_ARGUMENT_BUFFERS=0
          export DYLD_LIBRARY_PATH="$(brew --prefix)/lib:$DYLD_LIBRARY_PATH"          
          vulkaninfo --summary

      - name: Install Vulkan (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/pal1000/mesa-dist-win/releases/download/23.3.2/mesa3d-23.3.2-release-msvc.7z" -OutFile "mesa.7z"
          7z x mesa.7z -omesa -y | Out-Null
          
          $lvpJson = (Resolve-Path "mesa\x64\lvp_icd.x86_64.json").Path
          $driverKey = "HKLM:\SOFTWARE\Khronos\Vulkan\Drivers"
          if (!(Test-Path $driverKey)) { New-Item -Path $driverKey -Force | Out-Null }
          New-ItemProperty -Path $driverKey -Name $lvpJson -PropertyType DWord -Value 0 -Force | Out-Null

          $sdkVersion = "1.3.290.0"
          $installer = "VulkanSDK-$sdkVersion-Installer.exe"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/$sdkVersion/windows/$installer" -OutFile $installer
          Start-Process -FilePath ".\$installer" -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait -NoNewWindow
          
          echo "VULKAN_SDK=C:\VulkanSDK\$sdkVersion" >> $env:GITHUB_ENV
          echo "C:\VulkanSDK\$sdkVersion\Bin" >> $env:GITHUB_PATH

      - name: Install PyTorch and Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest pytest-instafail setuptools wheel ninja

      - name: Build TorchVulkan
        run: |
          pip install -e .

      - name: Run Pytest
        env:
          MVK_CONFIG_LOG_LEVEL: 3
          VK_LOADER_DEBUG: all
        run: |
          pytest --instafail tests/ -v