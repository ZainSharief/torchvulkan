name: torchvulkan CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
          - name: macOS Apple Silicon
            os: macos-14 
          - name: Windows x86_64
            os: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Vulkan SDK and SwiftShader
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 'latest'
          install_swiftshader: true

      - name: Install PyTorch and Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest setuptools wheel ninja

      - name: Build TorchVulkan Extension
        run: |
          pip install -e .

      - name: Run Pytest
        run: |
          pytest tests/ -v