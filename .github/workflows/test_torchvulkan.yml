name: torchvulkan CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
          - name: Linux ARM64
            os: ubuntu-24.04-arm
          - name: macOS Intel
            os: macos-13
          - name: macOS Apple Silicon
            os: macos-14 
          - name: Windows x86_64
            os: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Vulkan (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y vulkan-tools libvulkan-dev mesa-vulkan-drivers
          vulkaninfo --summary

      - name: Install Vulkan (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install vulkan-headers vulkan-loader molten-vk          
          echo "VK_ICD_FILENAMES=/opt/homebrew/share/vulkan/icd.d/MoltenVK_icd.json:/usr/local/share/vulkan/icd.d/MoltenVK_icd.json" >> $GITHUB_ENV

      - name: Install Vulkan (Windows)
        if: runner.os == 'Windows'
        run: |
          curl -L "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe" -o vulkan-sdk.exe
          .\vulkan-sdk.exe --root C:\VulkanSDK --accept-licenses --default-answer --confirm-command install
          echo "VULKAN_SDK=C:\VulkanSDK" >> $env:GITHUB_ENV
          echo "C:\VulkanSDK\Bin" >> $env:GITHUB_PATH

      - name: Install PyTorch and Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch pytest setuptools wheel ninja

      - name: Build TorchVulkan Extension
        run: |
          # Install the local C++ backend
          pip install -e .

      - name: Run Pytest
        run: |
          # Run your test suite
          pytest tests/ -v